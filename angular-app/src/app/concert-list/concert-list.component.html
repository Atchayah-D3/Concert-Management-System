<div class="concert-page">
  <h2 class="page-title">Available Concerts</h2>

  <div class="concert-list">
    <div class="concert-card" *ngFor="let concert of concerts; trackBy: trackById">
      
      <h3>{{ concert.concertName }}</h3>

      <p><strong>Artist:</strong> {{ concert.concertSpec?.artist }}</p>
      <p><strong>Date:</strong> {{ concert.concertSpec?.date_Time }}</p>
      <p><strong>Price:</strong> {{ concert.concertSpec?.price | currency:'INR' }}</p>

      <div class="card-actions">
        <button
          class="delete-btn"
          *ngIf="concert.creatorId !== undefined && authService.canDeleteConcert(concert.creatorId)"
          (click)="confirmDelete(concert.concertId)">
          Delete
        </button>

        <button
          class="update-btn"
          *ngIf="concert.creatorId !== undefined && authService.canUpdateConcert(concert.creatorId)"
          (click)="update()">
          Update
        </button>
      </div>

    </div>
  </div>
</div>
